[app]
fps = 30
rows = 2
columns = 12
iterations = 300

[capture]
backend = "windows-mss"
monitor_index = 1
width = 120
height = 20

[mapping]
backend = "calibrated"
zone_profile = "mapping/msi_vector16_2x12.json"

[driver]
backend = "simulated"
hid_path = ""
vendor_id = "0x1462"
product_id = "0x1603"
report_id = 1
write_method = "output"
pad_length = 64
packet_template = "{report_id} {zone} {r} {g} {b}"
calibration_profile = "calibration/final_script_smoke2.json"

[smoothing]
enabled = false
alpha = 0.25

[brightness]
max_percent = 100

[runtime]
max_consecutive_errors = 5
error_backoff_ms = 250
stop_on_error = false
strict_preflight = true
reconnect_on_error = true
reconnect_attempts = 1
watchdog_interval_iterations = 300
watchdog_output = "artifacts/live_watchdog.json"
event_log_interval_iterations = 30
event_log_output = "artifacts/live_events.jsonl"
restore_on_exit = true
restore_color = "0,0,0"
