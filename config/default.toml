[app]
fps = 10
rows = 2
columns = 12
iterations = 2000000000

[mode]
source = "screen"

[capture]
backend = "windows-mss"
monitor_index = 1
width = 120
height = 20

[mapping]
backend = "grid"
zone_profile = "mapping/msi_vector16_2x12.json"

[driver]
backend = "msi-mystic-hid"
hid_path = "\\\\?\\HID#VID_1462&PID_1603#6&a3fe5ce&0&0000#{4d1e55b2-f16f-11cf-88cb-001111000030}"
vendor_id = "0x1462"
product_id = "0x1603"
report_id = 1
write_method = "output"
pad_length = 64
packet_template = "{report_id} {zone} {r} {g} {b}"
calibration_profile = ""

[audio]
input_kind = "output-loopback"
device_id = "speaker:Speakers (Corsair HS80 RGB USB Gaming Headset)"
sound_effect = "spectrum"
sample_rate_hz = 48000
frame_size = 2048
sensitivity = 1.0
attack_alpha = 0.55
decay_alpha = 0.1
noise_floor = 0.02
bass_gain = 1.3
mid_gain = 1.0
treble_gain = 1.0
zone_layout = "linear"
palette = ["0,80,255", "0,255,160", "255,200,0", "255,60,60"]

[smoothing]
enabled = false
alpha = 0.25

[brightness]
max_percent = 100

[runtime]
max_consecutive_errors = 5
error_backoff_ms = 250
stop_on_error = false
strict_preflight = false
reconnect_on_error = true
reconnect_attempts = 1
watchdog_interval_iterations = 0
watchdog_output = ""
event_log_interval_iterations = 0
event_log_output = ""
restore_on_exit = false
restore_color = "0,0,0"
